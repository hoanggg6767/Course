</head>

        </ul>
      </div>
    </div>
  </nav>

  <!-- ===== PAGE HEADER ===== -->
  <header class="bg-primary text-white text-center py-5">
    <div class="container">
      <h1 class="fw-bold">Liên hệ &amp; nhận báo giá</h1>
      <p class="lead mb-0">Để lại thông tin, chúng tôi sẽ liên hệ lại với bạn.</p>
    </div>
  </header>

  <!-- ===== NỘI DUNG: form liên hệ (component Forms) ===== -->
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <form action="#" method="post">
            <div class="row g-3">

              <div class="col-md-6">
                <label for="name" class="form-label">Họ và tên</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Nguyễn Văn A">
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="ban@email.com">
              </div>

              <div class="col-md-6">
                <label for="phone" class="form-label">Số điện thoại</label>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="09xx xxx xxx">
              </div>

              <div class="col-md-6">
                <label for="plan" class="form-label">Gói quan tâm</label>
                <select class="form-select" id="plan" name="plan">
                  <option selected>-- Chọn gói --</option>
                  <option value="free">Miễn phí</option>
                  <option value="standard">Tiêu chuẩn</option>
                  <option value="premium">Cao cấp</option>
                  <option value="enterprise">Doanh nghiệp (báo giá riêng)</option>
                </select>
              </div>

              <div class="col-12">
                <label for="message" class="form-label">Lời nhắn</label>
                <textarea class="form-control" id="message" name="message" rows="4"
                  placeholder="Bạn cần hỗ trợ gì?"></textarea>
              </div>

              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="agree" name="agree">
                  <label class="form-check-label" for="agree">Tôi đồng ý nhận báo giá qua email.</label>
                </div>
              </div>

              <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary btn-lg px-5">Gửi yêu cầu</button>
              </div>

            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->

    </div>
